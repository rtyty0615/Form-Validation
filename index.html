<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <form>
        <P>Form Validation: </P>
        
        <div>
            <label for="user_email">Email Address:</label>
            <input required type="email" id="user_email" name="email" placeholder="you@example.com">
        </div>
         <div>
            <label for="country">Country: </label>
            <select required id="country">
                <option value="ch">Switzerland</option>
                <option value="fr">France</option>
                <option value="de">Germany</option>
                <option value="nl">The Netherlands</option>
            </select>
        </div>
        <div>
            <label for="postal-code">Postal Code: </label>
            <input required type="text" id="postal-code" />
        </div>
        <div>
            <label for="password">Password:</label>
            <input required minlength="8" type="password" id="password" name="password">
        </div>
        <div>
            <label for="password-confirm">Password Confirmation: </label>
            <input required minlength="8" type="password" id="password-confirm" name="password-confirm">
        </div>

        <button type="submit">Create Account</button>
    
    </form>
</body>
</html>
